<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — GTO Course Platform</title>
    <meta name="description" content="Log in to access your AI Automation Fundamentals course.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #00D4FF;
            --accent-dark: #00A3CC;
            --dark: #0A0A0B;
            --dark-elevated: #141416;
            --dark-card: #1A1A1E;
            --light: #FAFAFA;
            --gray: #71717A;
            --gray-light: #A1A1AA;
            --border: rgba(255,255,255,0.08);
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --gto-teal: #00A5B5;
            --gto-blue: #0A2F5C;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 440px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            margin-bottom: 40px;
            justify-content: center;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--gto-teal) 0%, var(--gto-blue) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: white;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--light);
        }

        .logo-text span { color: var(--gto-teal); font-weight: 400; }

        .card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: var(--gray-light);
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--gray-light);
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--dark-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--light);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--gto-teal);
        }

        input::placeholder {
            color: var(--gray);
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--gto-teal) 0%, var(--accent) 100%);
            color: var(--dark);
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 165, 181, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--error);
            font-size: 0.875rem;
            margin-bottom: 20px;
            display: none;
        }

        .forgot-link {
            display: block;
            text-align: right;
            margin-top: -12px;
            margin-bottom: 20px;
            color: var(--gto-teal);
            text-decoration: none;
            font-size: 0.875rem;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--gray);
            font-size: 0.875rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            padding: 0 16px;
        }

        .register-link {
            text-align: center;
            color: var(--gray-light);
            font-size: 0.875rem;
        }

        .register-link a {
            color: var(--gto-teal);
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            color: var(--gray-light);
            text-decoration: none;
            font-size: 0.875rem;
        }

        .back-link:hover {
            color: var(--gto-teal);
        }

        @media (max-width: 480px) {
            .card {
                padding: 24px;
            }
            
            h1 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo">
            <div class="logo-icon">GTO</div>
            <div class="logo-text">Custom <span>Automation</span></div>
        </a>

        <div class="card">
            <h1>Welcome Back</h1>
            <p class="subtitle">Log in to continue your learning</p>

            <div id="error-message" class="error-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <a href="#" class="forgot-link" id="forgot-password">Forgot password?</a>

                <button type="submit" class="btn" id="submit-btn">Log In</button>
            </form>

            <div class="divider"><span>or</span></div>

            <p class="register-link">
                Don't have an account? <a href="register.html">Create Account</a>
            </p>
        </div>

        <a href="course/index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back to Course Info
        </a>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submit-btn');
            const errorMessage = document.getElementById('error-message');

            // Reset error
            errorMessage.style.display = 'none';

            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';

            // Attempt login
            const result = await authSystem.login(email, password);

            if (result.success) {
                window.location.href = 'dashboard.html';
            } else {
                errorMessage.textContent = result.error;
                errorMessage.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log In';
            }
        });

        // Forgot password handler
        document.getElementById('forgot-password').addEventListener('click', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const errorMessage = document.getElementById('error-message');
            
            if (!email) {
                errorMessage.textContent = 'Please enter your email address first.';
                errorMessage.style.display = 'block';
                return;
            }

            const result = await authSystem.resetPassword(email);
            
            if (result.success) {
                errorMessage.textContent = result.message;
                errorMessage.style.background = 'rgba(16, 185, 129, 0.1)';
                errorMessage.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                errorMessage.style.color = '#10B981';
                errorMessage.style.display = 'block';
            } else {
                errorMessage.textContent = result.error;
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
